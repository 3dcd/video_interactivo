<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Masa líquida táctil v2 suave móvil</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #f6f4ef;
    touch-action: none;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    background: radial-gradient(circle at 50% 40%, #fffaf0 0%, #ece7dc 100%);
  }
  .hint {
    position: fixed;
    left: 18px;
    bottom: 16px;
    color: rgba(0,0,0,.45);
    font-size: 14px;
    line-height: 1.3;
    user-select: none;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">Arrastrá sobre la masa: respuesta suave en celular/tablet</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = innerWidth;
  H = innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
  buildBlob();
}
window.addEventListener('resize', resize);

const N = 96;
let points = [];
let center = {x:0,y:0};
let baseRadius = 0;
let pointer = {down:false, touch:false, x:0, y:0, px:0, py:0, vx:0, vy:0, speed:0, rawX:0, rawY:0};
let cuts = [];

function buildBlob(){
  center.x = W/2;
  center.y = H/2;
  baseRadius = Math.min(W,H) * 0.24;
  points = [];
  for(let i=0;i<N;i++){
    const a = i/N * Math.PI*2;
    const r = baseRadius * (1 + 0.035*Math.sin(a*3));
    points.push({
      a, r, tr:r, vr:0,
      ox:0, oy:0, vx:0, vy:0
    });
  }
}

function distToSegment(px,py, ax,ay, bx,by){
  const dx = bx-ax, dy = by-ay;
  const l2 = dx*dx + dy*dy || 1;
  let t = ((px-ax)*dx + (py-ay)*dy)/l2;
  t = Math.max(0, Math.min(1, t));
  const x = ax + t*dx, y = ay + t*dy;
  return {d:Math.hypot(px-x,py-y), x, y, t};
}

function getEventPos(e){
  const t = e.touches ? e.touches[0] : e;
  return {x:t.clientX, y:t.clientY};
}

function onDown(e){
  e.preventDefault();
  const p = getEventPos(e);
  pointer.down = true;
  pointer.touch = (e.pointerType === 'touch') || !!e.touches;
  pointer.x = pointer.px = pointer.rawX = p.x;
  pointer.y = pointer.py = pointer.rawY = p.y;
  pointer.vx = pointer.vy = pointer.speed = 0;
}
function onMove(e){
  e.preventDefault();
  const p = getEventPos(e);
  pointer.touch = (e.pointerType === 'touch') || !!e.touches;
  pointer.rawX = p.x;
  pointer.rawY = p.y;

  // En táctil suavizamos la posición para que no exagere por el tamaño/ruido del dedo.
  const follow = pointer.touch ? 0.55 : 1.0;
  const nx = pointer.x + (pointer.rawX - pointer.x) * follow;
  const ny = pointer.y + (pointer.rawY - pointer.y) * follow;

  pointer.vx = nx - pointer.x;
  pointer.vy = ny - pointer.y;
  pointer.speed = Math.hypot(pointer.vx, pointer.vy);
  pointer.px = pointer.x;
  pointer.py = pointer.y;
  pointer.x = nx;
  pointer.y = ny;
  interact();
}
function onUp(){ pointer.down = false; }

canvas.addEventListener('pointerdown', onDown);
canvas.addEventListener('pointermove', onMove);
canvas.addEventListener('pointerup', onUp);
canvas.addEventListener('pointercancel', onUp);
canvas.addEventListener('touchstart', onDown, {passive:false});
canvas.addEventListener('touchmove', onMove, {passive:false});
canvas.addEventListener('touchend', onUp);

function interact(){
  const dx = pointer.x - center.x;
  const dy = pointer.y - center.y;
  const pd = Math.hypot(dx,dy);
  const influence = baseRadius * 0.78;
  const inside = pd < baseRadius * 1.15;

  const moveAng = Math.atan2(pointer.vy, pointer.vx);
  const pushAng = Math.atan2(dy, dx);

  for(const p of points){
    const bx = center.x + Math.cos(p.a)*p.r;
    const by = center.y + Math.sin(p.a)*p.r;
    const d = Math.hypot(pointer.x-bx, pointer.y-by);
    const f = Math.max(0, 1 - d/influence);
    if(f > 0){
      const towardFinger = Math.cos(p.a-pushAng);
      const tangent = Math.sin(p.a-moveAng);
      // En mouse conserva la sensación de la v2. En táctil baja aprox. a la mitad.
      const k = pointer.touch ? 0.50 : 1.0;
      p.vr += f * (inside ? 12 : 5) * k * Math.sign(towardFinger || 1);
      p.vr -= Math.abs(tangent) * f * pointer.speed * 0.22 * k;
      p.ox += pointer.vx * f * 0.26 * k;
      p.oy += pointer.vy * f * 0.26 * k;
    }
  }

  if(inside && pointer.speed > (pointer.touch ? 26 : 16)){
    cuts.push({
      ax:pointer.px, ay:pointer.py, bx:pointer.x, by:pointer.y,
      life:1,
      width:Math.min(58, pointer.speed*2.4*(pointer.touch ? 0.5 : 1))
    });
  }
}

function step(){
  // centro con respiración mínima
  const t = performance.now()*0.001;
  for(let i=0;i<N;i++){
    const p = points[i];
    const organic = baseRadius * (1 + 0.025*Math.sin(t*1.7 + p.a*3) + 0.015*Math.cos(t*2.1 + p.a*5));
    p.tr = organic;
    // tensión superficial: vuelve al radio base y suaviza contra vecinos
    const prev = points[(i-1+N)%N], next = points[(i+1)%N];
    const smooth = (prev.r + next.r)/2;
    const force = (p.tr - p.r)*0.026 + (smooth - p.r)*0.135;
    p.vr = (p.vr + force) * 0.88;
    p.r += p.vr;
    p.ox = (p.ox + p.vx) * 0.91;
    p.oy = (p.oy + p.vy) * 0.91;
    p.vx = -p.ox * 0.024;
    p.vy = -p.oy * 0.024;
  }
  cuts.forEach(c => c.life *= 0.88);
  cuts = cuts.filter(c => c.life > 0.035);
}

function blobPath(){
  const verts = points.map(p => ({
    x:center.x + Math.cos(p.a)*p.r + p.ox,
    y:center.y + Math.sin(p.a)*p.r + p.oy
  }));
  ctx.beginPath();
  for(let i=0;i<N;i++){
    const p0 = verts[(i-1+N)%N];
    const p1 = verts[i];
    const p2 = verts[(i+1)%N];
    const mid1 = {x:(p0.x+p1.x)/2, y:(p0.y+p1.y)/2};
    const mid2 = {x:(p1.x+p2.x)/2, y:(p1.y+p2.y)/2};
    if(i===0) ctx.moveTo(mid1.x, mid1.y);
    ctx.quadraticCurveTo(p1.x, p1.y, mid2.x, mid2.y);
  }
  ctx.closePath();
}

function draw(){
  ctx.clearRect(0,0,W,H);

  ctx.save();
  blobPath();
  ctx.fillStyle = '#030303';
  ctx.shadowColor = 'rgba(0,0,0,.18)';
  ctx.shadowBlur = 26;
  ctx.shadowOffsetY = 16;
  ctx.fill();
  ctx.restore();

  // brillo muy sutil para volumen líquido
  ctx.save();
  blobPath();
  const g = ctx.createRadialGradient(center.x-baseRadius*.35, center.y-baseRadius*.45, 5, center.x, center.y, baseRadius*1.2);
  g.addColorStop(0, 'rgba(255,255,255,.13)');
  g.addColorStop(.45, 'rgba(255,255,255,.03)');
  g.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = g;
  ctx.fill();
  ctx.restore();

  // Estela visual desactivada. En táctil la fuerza baja aprox. a la mitad.
  // No dibujamos el canal blanco del dedo.
}

function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}
resize();
loop();
</script>
</body>
</html>
